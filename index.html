<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کارت بانکی</title>
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card-container {
            background: white;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 360px;
            width: 85%;
        }
        .bank-card-img {
            width: 100%;
            border-radius: 14px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .copy-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s, transform 0.1s;
        }
        .copy-btn:hover {
            background-color: #0056b3;
        }
        .copy-btn:active {
            transform: scale(0.98);
        }
        .toast {
            margin-top: 12px;
            color: #28a745;
            font-size: 14px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="card-container">
    <!-- عکس کارت بانکی شما -->
    <img src="card.jpg" alt="کارت بانکی" class="bank-card-img">
    
    <!-- دکمه کپی -->
    <button class="copy-btn" onclick="copyCardNumber()">کپی شماره کارت</button>
    <div id="toast" class="toast">✓ شماره کارت کپی شد!</div>
</div>

<script>
    function copyCardNumber() {
        // حتماً به جای شماره زیر، شماره کارت ۱۶ رقمی خودتان را بنویسید
        const cardNumber = "6104338671482327"; 
        
        navigator.clipboard.writeText(cardNumber).then(() => {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }).catch(err => {
            alert('خطا در کپی؛ لطفاً دستی کپی کنید.');
        });
    }
</script>

</body>
</html>
